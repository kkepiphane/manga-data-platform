# version: "3.9"

services:

  scraper:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: manga_scraper
    volumes:  
      - .:/app
    working_dir: /app/ingestion 
    command: >
      sh -c "
      sleep 15 &&
      scrapy crawl senscritique &&
      scrapy crawl topito
      "
    depends_on:
      - kafka
    networks:
      - manga-network

# ==============================================
# SERVICE : POSTGRESQL 
# ==============================================
  postgres:
    image: postgres:15
    container_name: manga_postgres
    environment:
      POSTGRES_USER: manga
      POSTGRES_PASSWORD: manga12
      POSTGRES_DB: manga_db
    ports:
      - "5432:5432"
    networks:
      - manga-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manga -d manga_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

# ==============================================
# SERVICE : Kafka 
# ==============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - manga-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: manga_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - manga-network

# ==============================================
# SERVICE : Spark 
# ==============================================
  spark-master:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: manga_spark_master
    environment:
      - SPARK_MASTER_HOST=spark-master
      # - SPARK_MASTER_PORT=7077
      - NAMENODE_HOST=namenode
      - SPARK_ROLE=master
      - SPARK_ROLE=submit
    depends_on:
      - kafka
    ports:
      - "8080:8080" # Interface Web pour voir tes jobs
      - "7077:7077"
    volumes:
      - ./data_lake:/opt/spark/data_lake
    networks:
      - manga-network

  spark-worker:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: manga_spark_worker
    environment:
      - SPARK_ROLE=worker
      - SPARK_MASTER_HOST=spark-master
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./data_lake:/opt/spark/data_lake
    networks:
      - manga-network
  
    spark-submit:
      build:
        context: ./processing
        dockerfile: Dockerfile
      container_name: manga_spark_submit
      depends_on:
        - kafka
        - spark-master
      command: >
        spark-submit
        --master spark://spark-master:7077
        --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.2
        /opt/spark/jobs/streaming_job.py
      networks:
        - manga-network

# ==============================================
# SERVICE : airflow 
# ==============================================
  airflow:
    image: apache/airflow:2.9.0
    container_name: manga_airflow
    restart: always
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://manga:manga12@postgres/manga_db
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/app
    ports:
      - "8085:8080"
    command: >
      bash -c "
      airflow db init &&
      airflow users create \
        --username admin \
        --password admin \
        --firstname admin \
        --lastname admin \
        --role Admin \
        --email admin@mail.com &&
      airflow scheduler &
      airflow webserver
      "
    networks:
      - manga-network

# ==============================================
# SERVICE : monitoring 
# ==============================================
  prometheus:
    image: prom/prometheus
    container_name: manga_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - manga-network

  grafana:
    image: grafana/grafana
    container_name: manga_grafana
    ports:
      - "3000:3000"
    networks:
      - manga-network

  loki:
    image: grafana/loki
    container_name: manga_loki
    ports:
      - "3100:3100"
    networks:
      - manga-network

  promtail:
    image: grafana/promtail
    container_name: manga_promtail
    volumes:
      - /var/log:/var/log
    networks:
      - manga-network
      
  kafka-exporter:
    image: danielqsj/kafka-exporter
    container_name: manga_kafka_exporter
    command:
      - "--kafka.server=kafka:9092"
    ports:
      - "9308:9308"
    networks:
      - manga-network


networks:
  manga-network: