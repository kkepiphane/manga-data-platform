global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'spark'
    static_configs:
      - targets: ['spark-master:8080']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
    
  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow:8080']
      
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']